<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>STAR Answer Builder</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background: aliceblue; }
        main { padding: 8px; }
        .sim-wrapper { display: flex; gap: 12px; }
        .left-col { flex: 1.5; display: flex; flex-direction: column; gap: 8px; }
        .right-col { flex: 1; }
        .card { border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.15); background: #fff; overflow: hidden; }
        .card-header {
            padding: 6px 10px; color: #fff; font-weight: bold; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-body { padding: 8px 10px; }
        .card-prompt { font-size: 11px; color: #555; margin-bottom: 5px; }
        .card-body textarea {
            width: 100%; box-sizing: border-box; border: 1px solid #ccc;
            border-radius: 4px; font-size: 12px; padding: 5px; resize: vertical;
            font-family: Arial, Helvetica, sans-serif;
        }
        .char-count { font-size: 10px; color: #888; margin-top: 3px; text-align: right; }
        .preview-card {
            border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.15); background: #fff;
            display: flex; flex-direction: column;
        }
        .preview-header { background: #444; color: #fff; padding: 7px 10px; font-weight: bold; font-size: 13px; border-radius: 6px 6px 0 0; }
        .preview-body { padding: 10px; flex: 1; }
        .preview-text { font-size: 12px; line-height: 1.7; color: #222; min-height: 80px; }
        .preview-text em { color: #aaa; font-style: italic; }
        .word-count { font-size: 10px; color: #888; margin-top: 8px; }
        .practice-btn {
            margin-top: 10px; width: 100%; padding: 7px; background: #3a5fa0;
            color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .practice-btn:hover { background: #2d4c8a; }
        @media (max-width: 600px) { .sim-wrapper { flex-direction: column; } }
    </style>
    <script src="star-answer-builder.js"></script>
</head>
<body>
    <main></main>
    <br/>
    <a href=".">Back to Lesson Plan</a>
</body>
</html>
